<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Owen Nguyen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">Owen Nguyen</a>
    <div class="header-right">
      <nav class="nav">
        <a href="index.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="contact-body">

      <div class="contact-photo">
        <img src="images/about-portrait.png" alt="Owen Nguyen">
      </div>

      <div class="contact-content">
        <h1 class="contact-heading">Contact</h1>

        <div class="contact-inner">
          <!-- Form submissions go to Formspree — replace YOUR_FORM_ID after signing up at formspree.io -->
          <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="form-field">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="form-field">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="contact-submit">Send Message</button>
          </form>

          <div class="contact-meta">
            <div class="contact-meta-item">
              <p class="meta-label">Contact</p>
              <p class="meta-value">owenporternguyen@icloud.com</p>
            </div>
            <div class="contact-meta-item">
              <p class="meta-label">Based in</p>
              <p class="meta-value">Berkeley, CA</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <span>© 2026 Owen Nguyen</span>
  </footer>

  <script src="cursor.js"></script>

</body>
</html>
